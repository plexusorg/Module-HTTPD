name: Gradle

on: [ push ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - name: Build with Gradle
        run: chmod a+x gradlew && ./gradlew build --no-daemon